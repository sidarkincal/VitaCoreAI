<script>
  /* Tema (Aydınlık/Karanlık) — en erken çalışır ki sayfa parlamadan (FOUC) doğru modda açılsın.
     window.__toggleTheme React'ten önce tanımlanır; React butonu onClick ile bunu çağırır. */
  (function () {
    var KEY = 'vitacore-theme';
    var root = document.documentElement;
    try {
      var saved = localStorage.getItem(KEY);
      if (saved === 'light') root.classList.remove('dark');
      else if (saved === 'dark') root.classList.add('dark');
    } catch (e) {}
    function apply(mode) {
      root.classList.add('theme-anim');            // yalnızca geçiş anında yumuşak renk animasyonu
      if (mode === 'light') root.classList.remove('dark'); else root.classList.add('dark');
      try { localStorage.setItem(KEY, mode); } catch (e) {}
      clearTimeout(apply._t);
      apply._t = setTimeout(function () {
        root.classList.remove('theme-anim');
        // Emniyet kemeri: bazı gömülü tarayıcı motorları ata (<html>) sınıfı
        // değişince :not(.dark) seçicilerini mevcut öğelerde tazelemiyor. Geçiş
        // bittikten sonra tek seferlik, görünmez bir reflow ile son durumu
        // garanti ederiz; normal tarayıcılarda etkisizdir (geçiş zaten yumuşak).
        var sx = window.scrollX, sy = window.scrollY, b = document.body, d = b.style.display;
        b.style.display = 'none'; void b.offsetWidth; b.style.display = d || '';
        window.scrollTo(sx, sy);
      }, 620);
    }
    window.__toggleTheme = function () {
      apply(root.classList.contains('dark') ? 'light' : 'dark');
    };
    document.addEventListener('click', function (e) {
      var btn = e.target.closest ? e.target.closest('[data-theme-toggle]') : null;
      if (btn) { e.preventDefault(); window.__toggleTheme(); }
    });
  })();
</script>

  /* ====================== AYDINLIK / KARANLIK TEMA ======================
     Karanlık tema VARSAYILANDIR (html.dark). Aşağıdaki kurallar yalnızca
     AYDINLIK modda (html:not(.dark)) slate paletini bembeyaz/temiz bir
     palete çevirir; marka vurgu renkleri (emerald/cyan) korunur.
     Renk geçişi yalnızca tema değişimi anında (.theme-anim) çalışır → normal

  html.dark { color-scheme: dark; }
  html:not(.dark) { color-scheme: light; }

  html.theme-anim, html.theme-anim *, html.theme-anim *::before, html.theme-anim *::after {

  /* Tam-sayfa slate gradyanı: aydınlıkta gradyanı kaldır, beyaz gövde görünsün → yumuşak geçiş */

  html:not(.dark) .from-emerald-950\/60 { --tw-gradient-from: rgb(16 185 129 / .10) var(--tw-gradient-from-position); }

</style>

<script type="text/babel" data-presets="env,react">

// ---------- Yardımcı UI parçaları ----------

/* ============================================================================
   EGZERSİZ KOÇU — REÇETE TABANLI
   - Hareketler AI tarafından ÜRETİLMEZ. Kullanıcının yüklediği REÇETEDİR
     (kendi / fizyoterapist tarafından hazırlanan hareket listesi).
   - Bu modülün görevi: yüklenen listeyi SIRASIYLA, süre/set/tekrar ve
     dinlenmelerle uygulatmak; sesli koç ile eşlik etmek.
   - Kamera ile form takibi sonraki faz; şimdilik yer tutucu (CameraStage).

   VERİ SÖZLEŞMESİ (her hareket objesi):
   { id, name, target, mode:"sure"|"tekrar", duration, reps, sets,
     setRest, moveRest, note, steps:string[] }
   ========================================================================== */
const RECETE = [

const COACH_LINES = ["Derin bir nefes al… ve ver.", "Harika gidiyorsun, ritmini koru.", "Omuzlarını gevşet.", "Az kaldı, formuna dikkat et."];

/* ---------- Zamanlayıcı halkası (sahnenin imza öğesi) ---------- */
function TimerRing({ total, left, label, sublabel, accent = "emerald", size = 248, stroke = 14 }) {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const pct = total > 0 ? Math.max(0, Math.min(1, left / total)) : 0;
  const offset = c * (1 - pct);
  const gid = "ring-" + accent;
  return (
    <div className="relative grid place-items-center" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <defs>
          <linearGradient id={gid} x1="0%" y1="0%" x2="100%" y2="100%">
            {accent === "amber"
              ? (<><stop offset="0%" stopColor="#fbbf24" /><stop offset="100%" stopColor="#f97316" /></>)
              : (<><stop offset="0%" stopColor="#34d399" /><stop offset="100%" stopColor="#22d3ee" /></>)}
          </linearGradient>
        </defs>
        <circle cx={size / 2} cy={size / 2} r={r} stroke="#1e293b" strokeWidth={stroke} fill="none" />
        <circle cx={size / 2} cy={size / 2} r={r} stroke={`url(#${gid})`} strokeWidth={stroke} fill="none"
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset}
          style={{ transition: "stroke-dashoffset 1s linear" }} />
      </svg>
      <div className="absolute text-center">
        <div className={`font-black tabular-nums text-white ${size > 160 ? "text-6xl" : "text-2xl"}`}>{label}</div>
        {sublabel && <div className={`font-medium text-slate-400 ${size > 160 ? "mt-1 text-sm" : "text-[10px]"}`}>{sublabel}</div>}
      </div>
    </div>
  );
}

/* ---------- Sıra rayı: hareketleri SIRASIYLA gösterir ---------- */
function SequenceRail({ moves, current, phase }) {
  return (
    <div className="rounded-2xl border border-slate-800 bg-slate-900/60 backdrop-blur-xl p-4">
      <div className="flex items-center gap-2 px-1 pb-3 text-sm font-semibold text-emerald-400">
        <ClipboardList size={16} /> Reçeteniz
        <span className="ml-auto text-xs font-medium text-slate-500">{moves.length} hareket</span>
      </div>
      <ol className="space-y-1.5">
        {moves.map((m, i) => {
          const done = i < current || phase === "done";
          const active = i === current && phase !== "done";
          return (
            <li key={m.id}
              className={`flex items-center gap-3 rounded-xl border px-3 py-2.5 transition ${
                active ? "border-emerald-400/60 bg-emerald-500/10 ring-1 ring-emerald-400/30"
                : done ? "border-slate-800 bg-slate-950/40 opacity-60"
                : "border-slate-800 bg-slate-950/40"}`}>
              <div className={`grid h-7 w-7 shrink-0 place-items-center rounded-lg text-xs font-bold ${
                done ? "bg-emerald-500/20 text-emerald-300"
                : active ? "bg-gradient-to-br from-emerald-400 to-cyan-500 text-slate-950"
                : "bg-slate-800 text-slate-400"}`}>
                {done ? <Check size={14} /> : i + 1}
              </div>
              <div className="min-w-0 flex-1">
                <div className={`truncate text-sm font-medium ${active ? "text-white" : "text-slate-300"}`}>{m.name}</div>
                <div className="truncate text-[11px] text-slate-500">
                  {m.mode === "sure" ? `${m.duration} sn × ${m.sets} set` : `${m.reps} tekrar × ${m.sets} set`} · {m.target}
                </div>
              </div>
              {active && <span className="h-2 w-2 shrink-0 rounded-full bg-emerald-400 animate-pulse" />}
            </li>
          );
        })}
      </ol>
    </div>
  );
}

/* ---------- Kamera yer tutucu (form takibi · sonraki faz) ---------- */
function CameraStage({ children }) {
  return (
    <div className="relative aspect-[4/3] w-full overflow-hidden rounded-2xl border border-slate-800 bg-gradient-to-b from-slate-900 to-slate-950">
      <div className="absolute inset-0 opacity-[0.07]"
        style={{ backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)", backgroundSize: "28px 28px" }} />
      <div className="absolute left-1/2 top-1/2 h-56 w-56 -translate-x-1/2 -translate-y-1/2 rounded-full bg-emerald-500/10 blur-2xl animate-breathe" />
      <div className="absolute left-0 right-0 top-1/2 h-px bg-gradient-to-r from-transparent via-cyan-400/70 to-transparent animate-scan" />
      {["left-4 top-4 border-l-2 border-t-2","right-4 top-4 border-r-2 border-t-2","left-4 bottom-4 border-l-2 border-b-2","right-4 bottom-4 border-r-2 border-b-2"]
        .map((c, i) => <div key={i} className={`absolute h-6 w-6 rounded-[3px] border-emerald-400/40 ${c}`} />)}
      <div className="absolute left-4 top-4 inline-flex items-center gap-2 rounded-full border border-cyan-500/30 bg-slate-950/70 px-3 py-1.5 text-xs font-semibold text-cyan-300 backdrop-blur">
        <Camera size={13} /> Kamera ile form takibi · Yakında
      </div>
      <div className="relative grid h-full w-full place-items-center p-6">{children}</div>
    </div>
  );
}

  // --- Kokpit ---

      bas: [

      ],

  // --- Egzersiz Koçu (reçete tabanlı oynatıcı) ---
  // Hareketler kullanıcının yüklediği reçeteden gelir; AI üretmez.
  const moves = RECETE;
  const [phase, setPhase] = useState("lobby");     // lobby | active | rest | done
  const [idx, setIdx] = useState(0);               // aktif hareketin indeksi
  const [setNo, setSetNo] = useState(1);           // aktif set (1 tabanlı)
  const [left, setLeft] = useState(0);             // geri sayım (sn)
  const [running, setRunning] = useState(true);    // duraklat/devam
  const [restKind, setRestKind] = useState("set"); // "set" | "move"
  const [voiceOn, setVoiceOn] = useState(false);
  const [coachLine, setCoachLine] = useState(COACH_LINES[0]);
  const move = moves[idx];

  const totalMin = useMemo(() => {
    const secs = moves.reduce((a, m) => a + (m.mode === "sure" ? m.duration * m.sets : m.reps * 3 * m.sets)
      + m.setRest * (m.sets - 1) + m.moveRest, 0);
    return Math.round(secs / 60);
  }, [moves]);

  const speak = useCallback((t) => {
    if (!voiceOn || typeof window === "undefined" || !window.speechSynthesis) return;
    try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = "tr-TR"; u.rate = 0.96; window.speechSynthesis.speak(u); } catch (e) {}
  }, [voiceOn]);

  const beginMove = useCallback((i, n = 1) => {
    const m = moves[i];
    setIdx(i); setSetNo(n); setPhase("active"); setRunning(true);
    setLeft(m.mode === "sure" ? m.duration : 0);
    speak(`${m.name}. ${n}. set.`);
  }, [moves, speak]);

  const startWorkout = () => { window.speechSynthesis && window.speechSynthesis.cancel(); beginMove(0, 1); };
  const resetWorkout = () => { window.speechSynthesis && window.speechSynthesis.cancel(); setPhase("lobby"); setIdx(0); setSetNo(1); setLeft(0); };

  // bir seti tamamla → sonraki set / sonraki hareket / bitiş
  const completeSet = useCallback(() => {
    const m = moves[idx];
    if (setNo < m.sets) {
      if (m.setRest > 0) { setRestKind("set"); setLeft(m.setRest); setPhase("rest"); setRunning(true); }
      else beginMove(idx, setNo + 1);
    } else if (idx < moves.length - 1) {
      if (m.moveRest > 0) { setRestKind("move"); setLeft(m.moveRest); setPhase("rest"); setRunning(true); }
      else beginMove(idx + 1, 1);
    } else {
      setPhase("done"); burstStreak(3);
      speak("Tebrikler, antrenmanı tamamladınız.");
    }
  }, [moves, idx, setNo, beginMove, speak]);

  const resumeFromRest = useCallback(() => {
    if (restKind === "set") beginMove(idx, setNo + 1);
    else beginMove(idx + 1, 1);
  }, [restKind, idx, setNo, beginMove]);

  const goNext = () => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    if (idx < moves.length - 1) beginMove(idx + 1, 1);
    else { setPhase("done"); burstStreak(3); }

              </div>

                <div className="mt-4 mx-auto max-w-xs h-1.5 rounded-full bg-slate-800 overflow-hidden">
                  <div className="h-full w-1/2 bg-gradient-to-r from-cyan-500 to-emerald-400 animate-pulse"></div>
                </div>
              </div>
            ) : ocrState === "done" ? (
              <div>
                <CheckCircle2 size={48} className="mx-auto text-emerald-400" />
                <div className="mt-4 font-bold text-white text-lg">tahlil_sonucu.pdf analiz edildi ✓</div>
                <div className="mt-3 inline-block rounded-xl bg-slate-950 border border-slate-700 px-5 py-3 text-left text-sm">
                  <div className="text-slate-300">🔬 B12: <span className="text-amber-400 font-semibold">187 pg/mL (Düşük)</span></div>
                  <div className="text-slate-300">🩸 Hemoglobin: <span className="text-emerald-400 font-semibold">14.2 g/dL (Normal)</span></div>
                  <div className="text-slate-300">☀️ D Vitamini: <span className="text-amber-400 font-semibold">18 ng/mL (Yetersiz)</span></div>
                </div>
                <div className="mt-3 text-xs text-slate-500">AI önerisi: B12 takviyeniz ilaç listenize eklendi.</div>
              </div>
            ) : (
              <div>
                <UploadCloud size={48} className={`mx-auto ${dragOver ? "text-emerald-400" : "text-slate-500"}`} />
                <div className="mt-4 font-semibold text-white">Dosyanızı buraya sürükleyin veya tıklayın</div>
                <div className="mt-2 text-sm text-slate-500">PDF, PNG, JPG desteklenir · Maks 10MB</div>
                <div className="mt-4 flex justify-center gap-2">
                  {["PDF","PNG","JPG"].map(t => <span key={t} className="rounded-md bg-slate-800 px-2.5 py-1 text-xs text-slate-400 flex items-center gap-1"><FileText size={11}/>{t}</span>)}
                </div>
              </div>
            )}
          </div>
        </section>

        {/* ===== 6. ANALİTİK ===== */}
        <section className="mx-auto max-w-7xl px-4 sm:px-6 py-16 border-t border-slate-800/60" id="analiz">
          <SectionTitle icon={BarChart3} kicker="Analitik" title="Raporlama ve Trendler"
            desc="Son 7 günün verileri — AI bunlardan haftalık içgörü raporu üretir." />

          <div className="grid md:grid-cols-3 gap-5">
            {/* Kilo */}
            <Card>
              <div className="flex items-center gap-2 font-semibold text-white mb-1"><TrendingDown className="text-emerald-400" size={18}/> Haftalık Kilo</div>
              <div className="text-xs text-emerald-300 mb-4">-1.3 kg bu hafta 📉</div>
              <div className="flex items-end gap-2 h-32">
                {weekWeights.map((w, i) => (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <div className="w-full rounded-t-md bg-gradient-to-t from-emerald-600 to-emerald-400 transition-all hover:opacity-80" style={{ height: ((w - 80) / 3 * 100) + "%" }}></div>
                    <span className="text-[9px] text-slate-500">{["Pt","Sa","Ça","Pe","Cu","Ct","Pz"][i]}</span>
                  </div>
                ))}
              </div>
            </Card>
            {/* İlaç oranı */}
            <Card>
              <div className="flex items-center gap-2 font-semibold text-white mb-1"><Pill className="text-cyan-400" size={18}/> İlaç Uyum Oranı</div>
              <div className="text-xs text-amber-400 mb-4">Ortalama %66 — geliştirilebilir ⚠️</div>
              <div className="flex items-end gap-2 h-32">
                {medRates.map((r, i) => (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <div className={`w-full rounded-t-md transition-all hover:opacity-80 ${r < 50 ? "bg-gradient-to-t from-red-600 to-red-400" : "bg-gradient-to-t from-cyan-600 to-cyan-400"}`} style={{ height: r + "%" }}></div>
                    <span className="text-[9px] text-slate-500">{["Pt","Sa","Ça","Pe","Cu","Ct","Pz"][i]}</span>
                  </div>
                ))}
              </div>
            </Card>
            {/* Ağrı trendi */}
            <Card>
              <div className="flex items-center gap-2 font-semibold text-white mb-1"><Activity className="text-violet-400" size={18}/> Ağrı Seviyesi Trendi</div>
              <div className="text-xs text-emerald-300 mb-4">8 → 4: Düşüş trendinde ✅</div>
              <div className="flex items-end gap-2 h-32">
                {painTrend.map((p, i) => (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <div className="w-full rounded-t-md bg-gradient-to-t from-violet-600 to-fuchsia-400 transition-all hover:opacity-80" style={{ height: (p * 10) + "%" }}></div>
                    <span className="text-[9px] text-slate-500">{["Pt","Sa","Ça","Pe","Cu","Ct","Pz"][i]}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>

          {/* AI Haftalık Özet */}
          <div className="mt-6 rounded-3xl border border-emerald-500/30 bg-gradient-to-br from-emerald-950/60 to-slate-900 p-8 relative overflow-hidden">
            <div className="absolute top-0 right-0 h-48 w-48 bg-emerald-500/10 blur-3xl rounded-full"></div>
            <div className="flex items-start gap-4 relative">
              <div className="rounded-2xl bg-emerald-500/15 p-3 shrink-0"><Sparkles className="text-emerald-300" size={26} /></div>
              <div>
                <h3 className="font-bold text-white text-lg flex items-center gap-2">AI Haftalık Özet Raporu <span className="text-[10px] rounded-full bg-emerald-500/20 text-emerald-300 px-2 py-0.5 uppercase tracking-wider">Canlı Analiz</span></h3>
                <p className="mt-3 text-slate-300 leading-relaxed">
                  "Bu hafta ilaçlarınızı <strong className="text-amber-300">%40 aksattınız</strong>, bu durum bel ağrınızın artışıyla
                  <strong className="text-red-300"> paralel görünüyor</strong>. Kilo trendiniz olumlu ancak su tüketiminiz hedefin altında.
                  Lütfen <strong className="text-cyan-300">su tüketimini artırın</strong> ve akşam magnezyum dozunuzu atlamayın."
                </p>
                <div className="mt-4 text-xs text-slate-500">VitaCore AI Engine v1.0 · Son güncelleme: bugün 08:00</div>
              </div>
            </div>
          </div>
        </section>
      </div>

      {/* ===== 7. FOOTER ===== */}
      <footer className="border-t border-slate-800/60 bg-slate-950">
        <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12">
          <div className="flex flex-col md:flex-row items-center justify-between gap-6">
            <div className="flex items-center gap-3">
              <div className="h-10 w-10 rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center">
                <HeartPulse className="text-slate-950" size={22} />
              </div>
              <div>
                <div className="font-extrabold text-white">VitaCore <span className="text-emerald-400">AI</span></div>
                <div className="text-xs text-slate-500">Geleceğin Sağlık Kokpiti</div>
              </div>
            </div>
            <div className="text-center text-xs text-slate-500 leading-relaxed max-w-md">
              VitaCore AI tıbbi cihaz değildir; içerikler profesyonel tıbbi tavsiye yerine geçmez.
            </div>
            <div className="text-xs text-slate-600 text-center md:text-right">
              © 2026 VitaCore AI. Tüm hakları saklıdır.<br/>
              <span className="rounded-md bg-slate-900 border border-slate-800 px-2 py-0.5 text-emerald-400/80 font-mono">v1.0 MVP</span>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
